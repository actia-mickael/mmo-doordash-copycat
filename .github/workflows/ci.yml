name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kork-app .

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit and integration tests
        run: pytest tests/ -v
        
      - name: Run container
        run: docker run -d --name kork-container -p 8080:8090 kork-app

      - name: Wait for container to be ready
        run: sleep 5

      - name: Check container logs
        run: docker logs kork-container

      - name: Test endpoints
        run: |
          curl -f http://localhost:8080/
          curl -f http://localhost:8080/status/
          curl -f http://localhost:8080/estimate-time/5
          curl -X POST http://localhost:8080/calculate-fee/ -H "Content-Type: application/json" -d '{"distance_km": 10, "weight_kg": 2}'

      - name: Stop and clean container
        if: always()
        run: |
          docker stop kork-container
          docker rm kork-container
