name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kork-app .

      - name: Run container
        run: docker run -d --name kork-container -p 8080:8080 kork-app

      - name: Wait for container to be ready
        run: sleep 5

      - name: Test endpoints
        run: |
          curl -f http://localhost:8080/health || exit 1
          curl -f http://localhost:8080/api/endpoint1 || exit 1
          curl -f http://localhost:8080/api/endpoint2 || exit 1

      - name: Stop and clean container
        if: always()
        run: |
          docker stop kork-container
          docker rm kork-container
